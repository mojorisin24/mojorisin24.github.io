description: Neuroscience PhD Candidate at UC Davis 
# A brief blurb about yourself
content: Hello everyone, I am currently working with Dr. Erie Boorman and Dr. Steven Luck. My interests lie at the intersection of memory and decision making processes that guide behavior. Currently I am working on projects involving: working memory, the temporal credit assignment problem, and soon memory reinstatement decoding all using EEG. Outside of lab I enjoy going out with friends, playing the guitar, and occasionally playing videogames or trying out new hobbies. I am hoping to use this webpage as a directory to allow public access to all my analyses scripts for the projectes I am working on. If you are ever curious about something or would want to start a collaboration feel free to reach out!

